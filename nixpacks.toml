providers = ["node"]

# Nuxt 4 / Vite 7 / Tailwind v4 exigent Node 20+ (par défaut Nixpacks
# prend Node 18, ce qui casse le build).
[variables]
NIXPACKS_NODE_VERSION = "22"

# Installe nginx pour servir le site statique.
[phases.setup]
aptPkgs = ["nginx"]

# Génère un site 100% statique dans .output/public puis installe la config
# nginx avec le fallback SPA (try_files → index.html).
[phases.build]
cmds = [
    "npm run generate",
]

[start]
cmd = "nginx -c /app/nginx.conf -g 'daemon off;'"
